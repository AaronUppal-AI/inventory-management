name: Claude Code Review

# Self-hosted automatic PR review using claude-code-action.
# This is a substitute for Anthropic's hosted "Code Review" product, which
# requires a Team/Enterprise Claude.ai plan and org-admin setup at
# claude.ai/admin-settings/claude-code (not configurable via this repo).

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request, following the project's CLAUDE.md
            conventions. Focus on:

            1. Correctness bugs and edge cases
            2. Security issues (input validation, auth, injection risks)
            3. Reuse/simplification opportunities and obvious inefficiencies
            4. Test coverage for new/changed behavior

            Post specific issues as inline comments on the relevant lines.
            Use a top-level comment only for a brief overall summary.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
